<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#000d1a"/>
  
  {/* ground surface line */}
  <line x1="3" y1="8" x2="29" y2="8" stroke="#4a5568" stroke-width="0.8" stroke-linecap="round" />

  {/* basement room */}
  <rect x="4" y="8" width="24" height="20" rx="3" fill="#000912" stroke="#00a1e0" stroke-width="1"/>

  {/* human figure */}
  <circle cx="12" cy="15" r="2.5" fill="#f4f6f9"/>
  <rect x="10.5" y="17.5" width="3" height="5" rx="1" fill="#f4f6f9"/>
  <rect x="10.5" y="21" width="1.4" height="3" rx="0.7" fill="#f4f6f9"/>
  <rect x="12.1" y="21" width="1.4" height="3" rx="0.7" fill="#f4f6f9"/>

  {/* progress bars */}
  <rect x="18" y="16" width="2.4" height="8" rx="0.8" fill="#00a1e0" />
  <rect x="20.5" y="18" width="2.4" height="6" rx="0.8" fill="#00a1e0" opacity="0.7" />
  <rect x="23" y="21" width="2.4" height="3" rx="0.8" fill="#00a1e0" opacity="0.5" />

  {/* trend line */}
  <polyline points="18,16 20.5,13.5 23,11.5" fill="none" stroke="#00a1e0" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" />
</svg>
